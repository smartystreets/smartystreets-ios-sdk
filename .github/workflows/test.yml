name: Test

on:
  workflow_call:

jobs:
  test:
    strategy:
      matrix:
        include:
          - os: macos-14
            xcode: "15.4"
          - os: macos-15
            xcode: "16.2"
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - run: sudo xcode-select -s /Applications/Xcode_${{ matrix.xcode }}.app

      - run: make test
