name: Update Release

on:
  push:
    tags:
      - '*'
      - '!**-dev**'
    

jobs:
  test:
    strategy:
      matrix:
        include:
          - os: macos-14
            xcode: "15.4"
          - os: macos-15
            xcode: "16.2"
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - run: sudo xcode-select -s /Applications/Xcode_${{ matrix.xcode }}.app

      - run: make test

  release:
    needs: test
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set Version
        id: set_version
        run: |
          echo "VERSION=${GITHUB_REF#refs/tags/}" >> $GITHUB_ENV
        shell: bash

      - name: Create Release
        run: |
          gh release create ${{ env.VERSION }} --title "Release ${{ env.VERSION }}"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}